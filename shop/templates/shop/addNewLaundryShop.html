<!DOCTYPE html>
<html>
<head>
    <title>Add Laundry Shop</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        form {
            max-width: 400px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            padding: 10px;
            background-color: #3498db;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<h2>Add New Laundry Shop</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
</form>

</body>
</html>
